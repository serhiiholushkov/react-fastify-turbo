syntax = "proto3";

package workspace.v1;

import "workspace/v1/assignee.proto";
import "workspace/v1/priority.proto";
import "workspace/v1/project.proto";
import "workspace/v1/status.proto";

// ── Entity ────────────────────────────────────────────────────────────────────

message Task {
  int32 id = 1;
  // Human-friendly identifier combining project key and task id, e.g. "CORE-1"
  string slug = 2;
  Project project = 3;
  Status status = 4;
  Priority priority = 5;
  optional Assignee assignee = 6;
  string title = 7;
  string description = 8;
  string created_at = 9;
}

// ── Requests ──────────────────────────────────────────────────────────────────

message GetTasksRequest {}

message GetFormOptionsRequest {}

message CreateTaskRequest {
  string title = 1;
  string description = 2;
  int32 project_id = 3;
  int32 priority_id = 4;
  optional int32 assignee_id = 5;
}

// ── Responses ─────────────────────────────────────────────────────────────────

message GetTasksResponse {
  repeated Task tasks = 1;
}

message GetFormOptionsResponse {
  repeated Priority priorities = 1;
  repeated Project projects = 2;
  repeated Assignee assignees = 3;
}

message CreateTaskResponse {
  Task task = 1;
}

// ── Service ───────────────────────────────────────────────────────────────────

service TaskService {
  rpc GetTasks(GetTasksRequest) returns (GetTasksResponse);
  rpc GetFormOptions(GetFormOptionsRequest) returns (GetFormOptionsResponse);
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
}
