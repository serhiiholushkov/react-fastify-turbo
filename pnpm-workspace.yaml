packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  "@bufbuild/buf": true
  "@clerk/shared": false
  esbuild: false
  unrs-resolver: false

# Central version catalog — the pnpm equivalent of .NET's Directory.Packages.props.
# Reference any entry below in package.json files with `catalog:` instead of a version string.
catalog:
  # Core tooling
  typescript: ^6.0.3
  eslint: ^9.39.1
  prettier: ^3.8.3

  # Node types
  "@types/node": ^22.19.19

  # React ecosystem
  react: ^19.2.0
  react-dom: ^19.2.0
  "@types/react": ^19.2.0
  "@types/react-dom": ^19.2.0

  # Shared UI utilities (used in both apps/web and packages/ui)
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  lucide-react: ^1.16.0
  radix-ui: ^1.4.3
  tailwind-merge: ^3.6.0
  tailwindcss: ^4.3.0

  # TanStack (apps/web)
  "@tanstack/react-devtools": 0.10.5
  "@tanstack/react-query": 5.100.14
  "@tanstack/react-query-devtools": 5.100.14
  "@tanstack/react-router": 1.170.7
  "@tanstack/react-router-devtools": 1.167.0
  "@tanstack/react-router-ssr-query": 1.167.0
  "@tanstack/react-start": 1.168.10
  "@tanstack/devtools-vite": 0.7.0

  # RPC and Protobuf tooling (packages/api-rpc)
  "@bufbuild/protobuf": "^2.12.0"
  "@connectrpc/connect": "^2.1.2"
  "@connectrpc/connect-web": "^2.1.2"
  "@bufbuild/buf": "^1.71.0"
  "@bufbuild/protoc-gen-es": "^2.12.0"
  "@connectrpc/protoc-gen-connect-es": "^1.7.0"
